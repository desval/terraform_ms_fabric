# Reusable Terraform steps for one environment.
# Auth comes from the per-environment Azure service connection (addSpnToEnvironment),
# so each stage can ONLY touch the environment its service connection is scoped to.
# That credential isolation is the real guardrail against deploying to the wrong env.
parameters:
- name: environment        # dev | test | prod (used for directory + logging)
  type: string
- name: serviceConnection  # per-env ARM service connection name
  type: string
- name: applyChanges       # false = plan only; true = plan then apply
  type: boolean
  default: false

steps:
- task: AzureCLI@2
  displayName: 'Terraform ${{ parameters.environment }} (apply=${{ parameters.applyChanges }})'
  inputs:
    azureSubscription: ${{ parameters.serviceConnection }}
    scriptType: bash
    addSpnToEnvironment: true
    workingDirectory: '$(Build.SourcesDirectory)/environments/${{ parameters.environment }}'
    inlineScript: |
      set -euo pipefail

      # Backend (azurerm) auth
      export ARM_CLIENT_ID="$servicePrincipalId"
      export ARM_CLIENT_SECRET="$servicePrincipalKey"
      export ARM_TENANT_ID="$tenantId"
      export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"

      # Fabric + azuread provider auth (same SP)
      export FABRIC_CLIENT_ID="$servicePrincipalId"
      export FABRIC_CLIENT_SECRET="$servicePrincipalKey"
      export FABRIC_TENANT_ID="$tenantId"

      terraform init -input=false
      terraform plan -input=false -out=tfplan

      if [ "${{ parameters.applyChanges }}" = "True" ]; then
        terraform apply -input=false tfplan
      fi
